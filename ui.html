<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -20px;
      width: 200px; height: 120px;
      background: radial-gradient(ellipse at 60% 50%, rgba(0,180,216,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -20px; right: 40px;
      width: 140px; height: 80px;
      background: radial-gradient(ellipse at 40% 50%, rgba(255,255,255,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.3px;
      z-index: 1;
    }
    .header-brand {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-brand strong {
      color: #ffffff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.2px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f0fafb;
      border: 1px solid #d0eef2;
      border-radius: 8px;
    }
    .status-card.error {
      background: #fff5f3;
      border-color: #fdd;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.loading {
      background: #f5a623;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.active {
      background: #18a957;
      box-shadow: 0 0 8px rgba(24,169,87,0.5);
      animation: glow 2s ease-in-out infinite;
    }
    .status-dot.error-dot {
      background: #f24822;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px rgba(24,169,87,0.3); }
      50% { box-shadow: 0 0 10px rgba(24,169,87,0.7); }
    }

    .status-info { flex: 1; }
    .status-label {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .status-detail {
      font-size: 10px;
      color: #666;
      margin-top: 1px;
    }

    .insights-section { display: flex; flex-direction: column; gap: 0; }

    .insight-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-top: 1px solid #eee;
    }
    .insight-item:last-child {
      border-bottom: 1px solid #eee;
    }

    .insight-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .insight-icon svg {
      width: 16px; height: 16px;
    }

    .insight-content { flex: 1; }
    .insight-title {
      font-size: 11px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .insight-desc {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
      line-height: 1.3;
    }

    .all-good {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: #f0faf4;
      border: 1px solid #c8e6d5;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      color: #18a957;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #00B4D8;
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .github-link:hover {
      color: #0096b7;
      text-decoration: underline;
    }
    .github-link svg {
      width: 14px; height: 14px;
    }

    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: #999;
      flex-shrink: 0;
      border-top: 1px solid #f0f0f0;
    }
    .footer a {
      color: #00B4D8;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">MCP Bridge</span>
    <span class="header-brand">Made by <strong>Figma Make</strong></span>
  </div>

  <div class="content">
    <div class="status-card" id="status-card">
      <div class="status-dot loading" id="status-dot"></div>
      <div class="status-info">
        <div class="status-label" id="status-label">Initializing...</div>
        <div class="status-detail" id="status-detail">Scanning for MCP servers</div>
      </div>
    </div>

    <div id="features-section" style="display:none;">
      <div class="section-title">Insights</div>
      <div class="insights-section" id="features-list"></div>
    </div>

    <div id="all-good-section" style="display:none;">
      <div class="all-good">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#18a957" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        All features available
      </div>
    </div>

    <div style="margin-top:auto; text-align:center;">
      <a href="javascript:void(0)" onclick="window.open('https://github.com/TserreOnepoint/figma-desktop-bridge','_blank')" class="github-link">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.694.825.576C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
        View on GitHub
      </a>
    </div>
  </div>

  <div class="footer">
    Brought to you by <a href="javascript:void(0)" onclick="window.open('https://www.linkedin.com/in/thib-serre/','_blank')">Thib'z</a>
  </div>

  <script>
    // ============================================================================
    // GLOBAL STATE
    // ============================================================================
    window.__figmaVariablesData = null;
    window.__figmaVariablesReady = false;
    window.__figmaCapabilities = null;
    window.__figmaCapabilityErrors = [];
    window.__figmaComponentData = null;
    window.__figmaComponentRequests = new Map();
    window.__figmaPendingRequests = new Map();

    let requestIdCounter = 0;

    function updateStatus(state, isActive, isError) {
      var dot = document.getElementById('status-dot');
      var label = document.getElementById('status-label');
      var detail = document.getElementById('status-detail');
      var card = document.getElementById('status-card');
      dot.className = 'status-dot ' + (isError ? 'error-dot' : (isActive ? 'active' : 'loading'));
      card.className = 'status-card' + (isError ? ' error' : '');
      if (isError) { label.textContent = 'Connection error'; detail.textContent = state || 'Could not reach plugin worker'; }
      else if (isActive) { label.textContent = 'Desktop Bridge active'; detail.textContent = 'Connected and ready'; }
      else { label.textContent = 'Connecting...'; detail.textContent = 'Scanning for MCP servers'; }
    }

    function renderCapabilities(capabilities, errors) {
      var section = document.getElementById('features-section');
      var list = document.getElementById('features-list');
      var allGood = document.getElementById('all-good-section');
      var featureMeta = {
        variables: { title: 'Variables API unavailable', desc: 'Variable operations (create, read, update, delete) are not supported in this editor.' },
        pages: { title: 'Multi-page access unavailable', desc: 'Cannot load all pages. Some cross-page operations may not work.' },
        events: { title: 'Real-time events unavailable', desc: 'Document changes, selection tracking, and page change events are disabled.' }
      };
      if (!errors || errors.length === 0) { section.style.display = 'none'; allGood.style.display = 'block'; return; }
      allGood.style.display = 'none';
      section.style.display = 'flex'; section.style.flexDirection = 'column'; section.style.gap = '10px';
      list.innerHTML = '';
      for (var i = 0; i < errors.length; i++) {
        var err = errors[i];
        var meta = featureMeta[err.feature] || { title: err.feature, desc: err.error };
        var item = document.createElement('div');
        item.className = 'insight-item';
        item.innerHTML = '<div class="insight-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#00B4D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>' + '<div class="insight-content">' + '<div class="insight-title">' + meta.title + '</div>' + '<div class="insight-desc">' + meta.desc + '</div>' + '</div>';
        list.appendChild(item);
      }
    }

    // ============================================================================
    // COMMAND INFRASTRUCTURE
    // ============================================================================
    window.sendPluginCommand = (type, params, timeoutMs) => {
      timeoutMs = timeoutMs || 15000;
      return new Promise((resolve, reject) => {
        const requestId = type.toLowerCase() + '_' + (++requestIdCounter) + '_' + Date.now();
        const timeoutId = setTimeout(() => {
          if (window.__figmaPendingRequests.has(requestId)) {
            window.__figmaPendingRequests.delete(requestId);
            reject(new Error(type + ' request timed out after ' + timeoutMs + 'ms'));
          }
        }, timeoutMs);
        window.__figmaPendingRequests.set(requestId, { resolve, reject, type, timeoutId });
        var message = { type: type, requestId: requestId };
        for (var key in params) { if (params.hasOwnProperty(key)) message[key] = params[key]; }
        parent.postMessage({ pluginMessage: message }, '*');
      });
    };

    // ============================================================================
    // WINDOW API - All operations exposed to CDP/WebSocket
    // ============================================================================
    window.executeCode = (code, timeout) => window.sendPluginCommand('EXECUTE_CODE', { code, timeout: timeout || 5000 }, (timeout || 5000) + 2000).catch(e => ({ success: false, error: e.message }));
    window.updateVariable = (variableId, modeId, value) => window.sendPluginCommand('UPDATE_VARIABLE', { variableId, modeId, value }).catch(e => ({ success: false, error: e.message }));
    window.createVariable = (name, collectionId, resolvedType, options) => { var params = { name, collectionId, resolvedType }; if (options) { if (options.valuesByMode) params.valuesByMode = options.valuesByMode; if (options.description) params.description = options.description; if (options.scopes) params.scopes = options.scopes; } return window.sendPluginCommand('CREATE_VARIABLE', params).catch(e => ({ success: false, error: e.message })); };
    window.createVariableCollection = (name, options) => { var params = { name }; if (options) { if (options.initialModeName) params.initialModeName = options.initialModeName; if (options.additionalModes) params.additionalModes = options.additionalModes; } return window.sendPluginCommand('CREATE_VARIABLE_COLLECTION', params).catch(e => ({ success: false, error: e.message })); };
    window.deleteVariable = (variableId) => window.sendPluginCommand('DELETE_VARIABLE', { variableId }).catch(e => ({ success: false, error: e.message }));
    window.deleteVariableCollection = (collectionId) => window.sendPluginCommand('DELETE_VARIABLE_COLLECTION', { collectionId }).catch(e => ({ success: false, error: e.message }));
    window.renameVariable = (variableId, newName) => window.sendPluginCommand('RENAME_VARIABLE', { variableId, newName }).catch(e => ({ success: false, error: e.message }));
    window.setVariableDescription = (variableId, description) => window.sendPluginCommand('SET_VARIABLE_DESCRIPTION', { variableId, description }).catch(e => ({ success: false, error: e.message }));
    window.addMode = (collectionId, modeName) => window.sendPluginCommand('ADD_MODE', { collectionId, modeName }).catch(e => ({ success: false, error: e.message }));
    window.renameMode = (collectionId, modeId, newName) => window.sendPluginCommand('RENAME_MODE', { collectionId, modeId, newName }).catch(e => ({ success: false, error: e.message }));
    window.refreshVariables = () => window.sendPluginCommand('REFRESH_VARIABLES', {}, 300000).catch(e => ({ success: false, error: e.message }));
    window.getLocalComponents = () => window.sendPluginCommand('GET_LOCAL_COMPONENTS', {}, 300000).catch(e => ({ success: false, error: e.message }));
    window.instantiateComponent = (componentKey, options) => { var params = { componentKey }; if (options) { if (options.nodeId) params.nodeId = options.nodeId; if (options.position) params.position = options.position; if (options.size) params.size = options.size; if (options.overrides) params.overrides = options.overrides; if (options.variant) params.variant = options.variant; if (options.parentId) params.parentId = options.parentId; } return window.sendPluginCommand('INSTANTIATE_COMPONENT', params).catch(e => ({ success: false, error: e.message })); };
    window.requestComponentData = (nodeId) => new Promise((resolve, reject) => { const requestId = 'component_' + (++requestIdCounter) + '_' + Date.now(); window.__figmaComponentRequests.set(requestId, { resolve, reject }); parent.postMessage({ pluginMessage: { type: 'GET_COMPONENT', requestId, nodeId } }, '*'); setTimeout(() => { if (window.__figmaComponentRequests.has(requestId)) { window.__figmaComponentRequests.delete(requestId); reject(new Error('Component request timed out')); } }, 10000); });
    window.setNodeDescription = (nodeId, description, descriptionMarkdown) => window.sendPluginCommand('SET_NODE_DESCRIPTION', { nodeId, description, descriptionMarkdown }).catch(e => ({ success: false, error: e.message }));
    window.addComponentProperty = (nodeId, propertyName, type, defaultValue, options) => { var params = { nodeId, propertyName, propertyType: type, defaultValue }; if (options && options.preferredValues) params.preferredValues = options.preferredValues; return window.sendPluginCommand('ADD_COMPONENT_PROPERTY', params).catch(e => ({ success: false, error: e.message })); };
    window.editComponentProperty = (nodeId, propertyName, newValue) => window.sendPluginCommand('EDIT_COMPONENT_PROPERTY', { nodeId, propertyName, newValue }).catch(e => ({ success: false, error: e.message }));
    window.deleteComponentProperty = (nodeId, propertyName) => window.sendPluginCommand('DELETE_COMPONENT_PROPERTY', { nodeId, propertyName }).catch(e => ({ success: false, error: e.message }));
    window.resizeNode = (nodeId, width, height, withConstraints) => window.sendPluginCommand('RESIZE_NODE', { nodeId, width, height, withConstraints: withConstraints !== false }).catch(e => ({ success: false, error: e.message }));
    window.moveNode = (nodeId, x, y) => window.sendPluginCommand('MOVE_NODE', { nodeId, x, y }).catch(e => ({ success: false, error: e.message }));
    window.setNodeFills = (nodeId, fills) => window.sendPluginCommand('SET_NODE_FILLS', { nodeId, fills }).catch(e => ({ success: false, error: e.message }));
    window.setNodeStrokes = (nodeId, strokes, strokeWeight) => { var params = { nodeId, strokes }; if (strokeWeight !== undefined) params.strokeWeight = strokeWeight; return window.sendPluginCommand('SET_NODE_STROKES', params).catch(e => ({ success: false, error: e.message })); };
    window.setNodeOpacity = (nodeId, opacity) => window.sendPluginCommand('SET_NODE_OPACITY', { nodeId, opacity }).catch(e => ({ success: false, error: e.message }));
    window.setNodeCornerRadius = (nodeId, radius) => window.sendPluginCommand('SET_NODE_CORNER_RADIUS', { nodeId, radius }).catch(e => ({ success: false, error: e.message }));
    window.cloneNode = (nodeId) => window.sendPluginCommand('CLONE_NODE', { nodeId }).catch(e => ({ success: false, error: e.message }));
    window.deleteNode = (nodeId) => window.sendPluginCommand('DELETE_NODE', { nodeId }).catch(e => ({ success: false, error: e.message }));
    window.renameNode = (nodeId, newName) => window.sendPluginCommand('RENAME_NODE', { nodeId, newName }).catch(e => ({ success: false, error: e.message }));
    window.setTextContent = (nodeId, text, options) => { var params = { nodeId, text }; if (options) { if (options.fontSize) params.fontSize = options.fontSize; if (options.fontWeight) params.fontWeight = options.fontWeight; if (options.fontFamily) params.fontFamily = options.fontFamily; } return window.sendPluginCommand('SET_TEXT_CONTENT', params).catch(e => ({ success: false, error: e.message })); };
    window.createChildNode = (parentId, nodeType, properties) => window.sendPluginCommand('CREATE_CHILD_NODE', { parentId, nodeType, properties: properties || {} }).catch(e => ({ success: false, error: e.message }));
    window.captureScreenshot = (nodeId, options) => { var params = { nodeId }; if (options) { if (options.format) params.format = options.format; if (options.scale) params.scale = options.scale; } return window.sendPluginCommand('CAPTURE_SCREENSHOT', params, 30000).catch(e => ({ success: false, error: e.message })); };
    window.setInstanceProperties = (nodeId, properties) => window.sendPluginCommand('SET_INSTANCE_PROPERTIES', { nodeId, properties }).catch(e => ({ success: false, error: e.message }));

    // ============================================================================
    // WEBSOCKET BRIDGE CLIENT
    // ============================================================================
    (function() {
      var WS_PORT_RANGE_START = 9223;
      var WS_PORT_RANGE_END = 9232;
      var activeConnections = [];
      var wsReconnectDelay = 500;
      var wsMaxReconnectDelay = 5000;
      var wsReconnectAttempts = 0;
      var wsMaxReconnectAttempts = 50;
      var isScanning = false;
      var ws = null;
      var wsPort = null;
      var wsConnected = false;

      var methodMap = {
        'EXECUTE_CODE': function(params) { return window.executeCode(params.code, params.timeout); },
        'UPDATE_VARIABLE': function(params) { return window.updateVariable(params.variableId, params.modeId, params.value); },
        'CREATE_VARIABLE': function(params) { return window.createVariable(params.name, params.collectionId, params.resolvedType, params); },
        'DELETE_VARIABLE': function(params) { return window.deleteVariable(params.variableId); },
        'DELETE_VARIABLE_COLLECTION': function(params) { return window.deleteVariableCollection(params.collectionId); },
        'RENAME_VARIABLE': function(params) { return window.renameVariable(params.variableId, params.newName); },
        'SET_VARIABLE_DESCRIPTION': function(params) { return window.setVariableDescription(params.variableId, params.description); },
        'ADD_MODE': function(params) { return window.addMode(params.collectionId, params.modeName); },
        'RENAME_MODE': function(params) { return window.renameMode(params.collectionId, params.modeId, params.newName); },
        'REFRESH_VARIABLES': function() { return window.refreshVariables(); },
        'CREATE_VARIABLE_COLLECTION': function(params) { return window.createVariableCollection(params.name, params); },
        'GET_LOCAL_COMPONENTS': function() { return window.getLocalComponents(); },
        'INSTANTIATE_COMPONENT': function(params) { return window.instantiateComponent(params.componentKey, params); },
        'GET_COMPONENT': function(params) { return window.requestComponentData(params.nodeId); },
        'SET_NODE_DESCRIPTION': function(params) { return window.setNodeDescription(params.nodeId, params.description, params.descriptionMarkdown); },
        'ADD_COMPONENT_PROPERTY': function(params) { return window.addComponentProperty(params.nodeId, params.propertyName, params.propertyType, params.defaultValue, params); },
        'EDIT_COMPONENT_PROPERTY': function(params) { return window.editComponentProperty(params.nodeId, params.propertyName, params.newValue); },
        'DELETE_COMPONENT_PROPERTY': function(params) { return window.deleteComponentProperty(params.nodeId, params.propertyName); },
        'RESIZE_NODE': function(params) { return window.resizeNode(params.nodeId, params.width, params.height, params.withConstraints); },
        'MOVE_NODE': function(params) { return window.moveNode(params.nodeId, params.x, params.y); },
        'SET_NODE_FILLS': function(params) { return window.setNodeFills(params.nodeId, params.fills); },
        'SET_NODE_STROKES': function(params) { return window.setNodeStrokes(params.nodeId, params.strokes, params.strokeWeight); },
        'SET_NODE_OPACITY': function(params) { return window.setNodeOpacity(params.nodeId, params.opacity); },
        'SET_NODE_CORNER_RADIUS': function(params) { return window.setNodeCornerRadius(params.nodeId, params.radius); },
        'CLONE_NODE': function(params) { return window.cloneNode(params.nodeId); },
        'DELETE_NODE': function(params) { return window.deleteNode(params.nodeId); },
        'RENAME_NODE': function(params) { return window.renameNode(params.nodeId, params.newName); },
        'SET_TEXT_CONTENT': function(params) { return window.setTextContent(params.nodeId, params.text, params); },
        'CREATE_CHILD_NODE': function(params) { return window.createChildNode(params.parentId, params.nodeType, params.properties); },
        'CAPTURE_SCREENSHOT': function(params) { return window.captureScreenshot(params.nodeId, params); },
        'SET_INSTANCE_PROPERTIES': function(params) { return window.setInstanceProperties(params.nodeId, params.properties); },
        'GET_VARIABLES_DATA': function() {
          if (window.__figmaVariablesReady && window.__figmaVariablesData) return Promise.resolve(window.__figmaVariablesData);
          return Promise.reject(new Error('Variables data not ready.'));
        },
        'GET_FILE_INFO': function() { return window.sendPluginCommand('GET_FILE_INFO', {}); },
        'CLEAR_CONSOLE': function() { return Promise.resolve({ cleared: true }); },
        'RELOAD_UI': function() { return window.sendPluginCommand('RELOAD_UI', {}); },
        'GET_CAPABILITIES': function() {
          if (window.__figmaCapabilities) return Promise.resolve({ capabilities: window.__figmaCapabilities, errors: window.__figmaCapabilityErrors });
          return Promise.reject(new Error('Capabilities not yet detected.'));
        }
      };

      function isPortConnected(port) { for (var i = 0; i < activeConnections.length; i++) { if (activeConnections[i].port === port && activeConnections[i].ws.readyState === 1) return true; } return false; }
      function removeConnection(port) { activeConnections = activeConnections.filter(function(c) { return c.port !== port; }); updateCompatState(); }
      function updateCompatState() { var live = activeConnections.filter(function(c) { return c.ws.readyState === 1; }); wsConnected = live.length > 0; if (live.length > 0) { ws = live[0].ws; wsPort = live[0].port; } else { ws = null; wsPort = null; } }

      function initializeConnection(connWs, port) {
        if (window.__figmaCapabilities) connWs.send(JSON.stringify({ type: 'CAPABILITIES', capabilities: window.__figmaCapabilities, errors: window.__figmaCapabilityErrors || [] }));
        if (window.__figmaVariablesReady && window.__figmaVariablesData) connWs.send(JSON.stringify({ type: 'VARIABLES_DATA', data: window.__figmaVariablesData }));
        window.sendPluginCommand('GET_FILE_INFO', {}).then(function(info) { if (connWs.readyState === 1 && info && info.success !== false) connWs.send(JSON.stringify({ type: 'FILE_INFO', data: info.fileInfo || info })); }).catch(function() {});
      }

      function wsScanAndConnect() {
        if (isScanning) return;
        isScanning = true;
        var portsToTry = [];
        for (var p = WS_PORT_RANGE_START; p <= WS_PORT_RANGE_END; p++) { if (!isPortConnected(p)) portsToTry.push(p); }
        if (portsToTry.length === 0) { isScanning = false; return; }
        console.log('[MCP Bridge] Scanning ports ' + WS_PORT_RANGE_START + '-' + WS_PORT_RANGE_END + ' for MCP servers...');
        var foundAny = false;
        var pending = portsToTry.length;
        portsToTry.forEach(function(port) {
          try {
            var testWs = new WebSocket('ws://localhost:' + port);
            var timeout = setTimeout(function() { if (testWs.readyState !== 1) testWs.close(); }, 3000);
            testWs.onopen = function() {
              clearTimeout(timeout); foundAny = true;
              activeConnections.push({ port: port, ws: testWs }); updateCompatState();
              console.log('[MCP Bridge] WebSocket connected to port ' + port + ' (' + activeConnections.length + ' server(s) total)');
              attachWsHandlers(testWs, port); initializeConnection(testWs, port);
              pending--;
              if (pending <= 0) { isScanning = false; if (foundAny) { wsReconnectDelay = 500; wsReconnectAttempts = 0; } }
            };
            testWs.onerror = function() {
              clearTimeout(timeout); pending--;
              if (pending <= 0) { isScanning = false; if (!foundAny && activeConnections.length === 0) { wsReconnectAttempts++; if (wsReconnectAttempts <= wsMaxReconnectAttempts) { setTimeout(wsScanAndConnect, wsReconnectDelay); wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, wsMaxReconnectDelay); } } }
            };
            testWs.onclose = function() {
              clearTimeout(timeout); pending--;
              if (pending <= 0 && !foundAny && activeConnections.length === 0) { isScanning = false; wsReconnectAttempts++; if (wsReconnectAttempts <= wsMaxReconnectAttempts) { setTimeout(wsScanAndConnect, wsReconnectDelay); wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, wsMaxReconnectDelay); } }
            };
          } catch (e) { pending--; }
        });
      }

      function wsReconnectPort(port) {
        try {
          var testWs = new WebSocket('ws://localhost:' + port);
          var timeout = setTimeout(function() { if (testWs.readyState !== 1) { testWs.close(); wsScanAndConnect(); } }, 2000);
          testWs.onopen = function() { clearTimeout(timeout); activeConnections.push({ port: port, ws: testWs }); updateCompatState(); attachWsHandlers(testWs, port); initializeConnection(testWs, port); };
          testWs.onerror = function() { clearTimeout(timeout); wsScanAndConnect(); };
        } catch (e) { wsScanAndConnect(); }
      }

      function attachWsHandlers(activeWs, port) {
        activeWs.onmessage = function(event) {
          try {
            var message = JSON.parse(event.data);
            if (!message.id || !message.method) return;
            var handler = methodMap[message.method];
            if (!handler) { activeWs.send(JSON.stringify({ id: message.id, error: 'Unknown method: ' + message.method })); return; }
            Promise.resolve(handler(message.params || {})).then(function(result) { if (activeWs.readyState === 1) activeWs.send(JSON.stringify({ id: message.id, result: result })); }).catch(function(err) { if (activeWs.readyState === 1) activeWs.send(JSON.stringify({ id: message.id, error: err.message || String(err) })); });
          } catch (e) { console.error('[MCP Bridge] WS:' + port + ': Failed to process message:', e); }
        };
        activeWs.onclose = function(event) {
          removeConnection(port);
          var wasReplaced = (event.code === 1000 && (event.reason === 'Replaced by new connection' || event.reason === 'Replaced by same file reconnection'));
          if (wasReplaced) return;
          wsReconnectAttempts++;
          if (wsReconnectAttempts <= wsMaxReconnectAttempts) { setTimeout(function() { wsReconnectPort(port); }, wsReconnectDelay); wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, wsMaxReconnectDelay); }
        };
        activeWs.onerror = function() {};
      }

      function broadcastToAll(message) { var json = JSON.stringify(message); activeConnections.forEach(function(conn) { if (conn.ws.readyState === 1) { try { conn.ws.send(json); } catch(e) {} } }); }

      window.__wsForwardVariables = function(data) { if (wsConnected) broadcastToAll({ type: 'VARIABLES_DATA', data: data }); };
      window.__wsForwardCapabilities = function(capabilities, errors) { if (wsConnected) broadcastToAll({ type: 'CAPABILITIES', capabilities: capabilities, errors: errors }); };
      window.__wsForwardDocumentChange = function(data) { if (wsConnected) broadcastToAll({ type: 'DOCUMENT_CHANGE', data: data }); };
      window.__wsForwardConsoleCapture = function(data) { if (wsConnected) broadcastToAll({ type: 'CONSOLE_CAPTURE', data: data }); };
      window.__wsForwardSelectionChange = function(data) { if (wsConnected) broadcastToAll({ type: 'SELECTION_CHANGE', data: data }); };
      window.__wsForwardPageChange = function(data) { if (wsConnected) broadcastToAll({ type: 'PAGE_CHANGE', data: data }); };

      wsScanAndConnect();
    })();

    // ============================================================================
    // MESSAGE HANDLER - Process responses from plugin worker
    // ============================================================================
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      const handleResult = (resultType, dataKey) => {
        const request = window.__figmaPendingRequests.get(msg.requestId);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (msg.success) {
            var result = { success: true };
            if (dataKey && msg[dataKey] !== undefined) result[dataKey] = msg[dataKey];
            if (msg.data !== undefined) result.data = msg.data;
            if (msg.oldName !== undefined) result.oldName = msg.oldName;
            if (msg.instance !== undefined) result.instance = msg.instance;
            request.resolve(result);
          } else {
            request.resolve({ success: false, error: msg.error || 'Unknown error' });
          }
          window.__figmaPendingRequests.delete(msg.requestId);
        }
      };

      switch (msg.type) {
        case 'CAPABILITIES':
          window.__figmaCapabilities = msg.capabilities;
          window.__figmaCapabilityErrors = msg.errors || [];
          updateStatus('ready', true, false);
          renderCapabilities(msg.capabilities, msg.errors || []);
          if (window.__wsForwardCapabilities) window.__wsForwardCapabilities(msg.capabilities, msg.errors);
          break;
        case 'VARIABLES_DATA':
          window.__figmaVariablesData = msg.data;
          window.__figmaVariablesReady = true;
          if (window.__wsForwardVariables) window.__wsForwardVariables(msg.data);
          break;
        case 'COMPONENT_DATA':
          window.__figmaComponentData = msg.data;
          var req = window.__figmaComponentRequests.get(msg.requestId);
          if (req) { req.resolve(msg.data); window.__figmaComponentRequests.delete(msg.requestId); }
          break;
        case 'COMPONENT_ERROR':
          var req2 = window.__figmaComponentRequests.get(msg.requestId);
          if (req2) { req2.reject(new Error(msg.error)); window.__figmaComponentRequests.delete(msg.requestId); }
          break;
        case 'ERROR':
          window.__figmaVariablesReady = false;
          updateStatus('error', false, true);
          break;
        case 'EXECUTE_CODE_RESULT': handleResult('EXECUTE_CODE', 'result'); break;
        case 'UPDATE_VARIABLE_RESULT': handleResult('UPDATE_VARIABLE', 'variable'); break;
        case 'CREATE_VARIABLE_RESULT': handleResult('CREATE_VARIABLE', 'variable'); break;
        case 'CREATE_VARIABLE_COLLECTION_RESULT': handleResult('CREATE_VARIABLE_COLLECTION', 'collection'); break;
        case 'DELETE_VARIABLE_RESULT': handleResult('DELETE_VARIABLE', 'deleted'); break;
        case 'DELETE_VARIABLE_COLLECTION_RESULT': handleResult('DELETE_VARIABLE_COLLECTION', 'deleted'); break;
        case 'REFRESH_VARIABLES_RESULT': handleResult('REFRESH_VARIABLES', null); break;
        case 'RENAME_VARIABLE_RESULT': handleResult('RENAME_VARIABLE', 'variable'); break;
        case 'SET_VARIABLE_DESCRIPTION_RESULT': handleResult('SET_VARIABLE_DESCRIPTION', 'variable'); break;
        case 'ADD_MODE_RESULT': handleResult('ADD_MODE', 'collection'); break;
        case 'RENAME_MODE_RESULT': handleResult('RENAME_MODE', 'collection'); break;
        case 'GET_LOCAL_COMPONENTS_RESULT': handleResult('GET_LOCAL_COMPONENTS', null); break;
        case 'INSTANTIATE_COMPONENT_RESULT': handleResult('INSTANTIATE_COMPONENT', 'instance'); break;
        case 'SET_NODE_DESCRIPTION_RESULT': handleResult('SET_NODE_DESCRIPTION', 'node'); break;
        case 'ADD_COMPONENT_PROPERTY_RESULT': handleResult('ADD_COMPONENT_PROPERTY', 'propertyName'); break;
        case 'EDIT_COMPONENT_PROPERTY_RESULT': handleResult('EDIT_COMPONENT_PROPERTY', 'propertyName'); break;
        case 'DELETE_COMPONENT_PROPERTY_RESULT': handleResult('DELETE_COMPONENT_PROPERTY', null); break;
        case 'RESIZE_NODE_RESULT': handleResult('RESIZE_NODE', 'node'); break;
        case 'MOVE_NODE_RESULT': handleResult('MOVE_NODE', 'node'); break;
        case 'SET_NODE_FILLS_RESULT': handleResult('SET_NODE_FILLS', 'node'); break;
        case 'SET_NODE_STROKES_RESULT': handleResult('SET_NODE_STROKES', 'node'); break;
        case 'SET_NODE_OPACITY_RESULT': handleResult('SET_NODE_OPACITY', 'node'); break;
        case 'SET_NODE_CORNER_RADIUS_RESULT': handleResult('SET_NODE_CORNER_RADIUS', 'node'); break;
        case 'CLONE_NODE_RESULT': handleResult('CLONE_NODE', 'node'); break;
        case 'DELETE_NODE_RESULT': handleResult('DELETE_NODE', 'deleted'); break;
        case 'RENAME_NODE_RESULT': handleResult('RENAME_NODE', 'node'); break;
        case 'SET_TEXT_CONTENT_RESULT': handleResult('SET_TEXT_CONTENT', 'node'); break;
        case 'CREATE_CHILD_NODE_RESULT': handleResult('CREATE_CHILD_NODE', 'node'); break;
        case 'CAPTURE_SCREENSHOT_RESULT': handleResult('CAPTURE_SCREENSHOT', 'image'); break;
        case 'SET_INSTANCE_PROPERTIES_RESULT': handleResult('SET_INSTANCE_PROPERTIES', 'instance'); break;
        case 'GET_FILE_INFO_RESULT': handleResult('GET_FILE_INFO', 'fileInfo'); break;
        case 'RELOAD_UI_RESULT': handleResult('RELOAD_UI', null); break;
        case 'DOCUMENT_CHANGE': if (window.__wsForwardDocumentChange) window.__wsForwardDocumentChange(msg.data); break;
        case 'CONSOLE_CAPTURE': if (window.__wsForwardConsoleCapture) window.__wsForwardConsoleCapture(msg); break;
        case 'SELECTION_CHANGE': if (window.__wsForwardSelectionChange) window.__wsForwardSelectionChange(msg.data); break;
        case 'PAGE_CHANGE': if (window.__wsForwardPageChange) window.__wsForwardPageChange(msg.data); break;
      }
    };
  </script>
</body>
